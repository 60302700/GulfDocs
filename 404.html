<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found | GulfDocs</title>
    <meta name="robots" content="noindex" />
    <link
        href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <!-- Fallback CSP for static hosting; keep in sync with netlify.toml -->
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self';">
    <script src="cookie-consent.js" defer></script>
    <style>
        .notfound-wrap {
            min-height: calc(100vh - 64px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 48px 24px;
        }

        .notfound-code {
            font-family: 'Sora', sans-serif;
            font-size: 88px;
            font-weight: 800;
            color: var(--accent-blue);
            line-height: 1;
            margin-bottom: 8px;
        }

        .notfound-wrap h1 {
            font-family: 'Sora', sans-serif;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .notfound-wrap p {
            color: var(--text-secondary);
            font-size: 14.5px;
            max-width: 420px;
            margin-bottom: 28px;
        }

        .notfound-links {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        .notfound-links a {
            padding: 10px 18px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 700;
            text-decoration: none;
        }

        .notfound-links a.primary {
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            color: var(--accent-blue);
        }

        .notfound-links a.secondary {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-primary);
        }
    </style>
</head>

<body>

    <nav>
        <a href="/" class="logo">GulfDocs<span>.</span></a>
        <div class="nav-badges">
            <span class="nav-badge blue">Free Forever</span>
            <span class="nav-badge">No Signup</span>
        </div>
    </nav>

    <div class="notfound-wrap">
        <div class="notfound-code">404</div>
        <h1>This page doesn't exist</h1>
        <p>The document or page you're looking for isn't here. It may have moved, or the link might be off.</p>
        <div class="notfound-links">
            <a href="/" class="primary">Go to Homepage</a>
            <a href="/custom-template.html" class="secondary">Custom Template Editor</a>
        </div>
    </div>

</body>

</html>
